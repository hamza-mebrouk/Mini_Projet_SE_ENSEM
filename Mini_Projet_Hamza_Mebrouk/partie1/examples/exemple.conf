# ============================================================
# Fichier de configuration des processus — exemple de base
# Format :
#   PROCESS <nom> <arrivée> [priorité]
#   CPU <durée>
#   IO  <durée>
#   CPU <durée>
#   END
# ============================================================

# Processus P1 : arrive à t=0, un burst CPU de 6
PROCESS P1 0 2
CPU 6
END

# Processus P2 : arrive à t=2, CPU-IO-CPU
PROCESS P2 2 1
CPU 3
IO  2
CPU 2
END

# Processus P3 : arrive à t=4, long burst CPU
PROCESS P3 4 3
CPU 8
END

# Processus P4 : arrive à t=1, priorité haute, petit burst
PROCESS P4 1 4
CPU 2
IO  3
CPU 1
END
